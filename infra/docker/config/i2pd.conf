[http]
enabled = true
address = 127.0.0.1
port    = 7070

[httpproxy]
enabled = true
address = 0.0.0.0
port    = 4444

[socksproxy]
enabled = true
address = 0.0.0.0
port    = 4447

[ntcp2]
enabled = true

# ── SAM v3 API ────────────────────────────────────────────────────────────────
# Required by zksn_node::i2p — the Rust SAM client connects here to create
# garlic sessions and streaming connections.
[sam]
enabled = true
address = 127.0.0.1
port    = 7656

# ── Bandwidth & tuning ────────────────────────────────────────────────────────
[bandwidth]
# P = 65 KiB/s share class. Use X (unlimited) on high-bandwidth nodes.
share = P

[limits]
transittunnels = 2500

[log]
type  = file
dest  = /dev/stdout
level = warn
