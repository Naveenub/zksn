# ZKSN i2pd configuration — Docker dev environment
# Generated for local testing only.

[general]
loglevel = warn
ipv6     = true

# Bandwidth (L=32KB, O=256KB, P=2MB, X=unlimited)
bandwidth = O

[ntcp2]
enabled = true
port    = 4567

[ssu2]
enabled = true
port    = 4568

[httpproxy]
enabled = true
address = 0.0.0.0
port    = 4444

[socksproxy]
enabled = true
address = 0.0.0.0
port    = 4447

[http]
enabled = true
address = 0.0.0.0
port    = 7070
