# i2pd tunnel definitions for ZKSN internal services
#
# Server tunnels expose a local TCP service as a .b32.i2p garlic address.
# The Rust node manages its own SAM session for outbound/inbound streaming,
# so these tunnels are for *auxiliary* services (e.g. Cashu mint, metrics).
#
# The mix node's primary garlic identity is created dynamically by
# zksn_node::i2p::SamSession via SAM — it does NOT go here.
#
# Reference: https://i2pd.readthedocs.io/en/latest/user-guide/tunnels/

# ── Cashu mint internal service ───────────────────────────────────────────────
# Expose the Cashu mint over I2P so clients can mint tokens without
# revealing the mint's IP address.
[zksn-mint]
type = http
host = cashu-mint
port = 3338
keys = zksn-mint.dat
# inbound.length/outbound.length: number of hops (3 = default, paranoid = 4)
inbound.length  = 3
outbound.length = 3

# ── Node metrics endpoint (internal only) ─────────────────────────────────────
# Prometheus scrape endpoint, exposed only within the I2P network.
# Never reachable from the clearnet.
[zksn-metrics]
type = http
host = 127.0.0.1
port = 9090
keys = zksn-metrics.dat
inbound.length  = 2
outbound.length = 2
