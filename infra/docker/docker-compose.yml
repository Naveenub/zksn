version: "3.9"

networks:
  zksn-dev:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  mix-node-1:
    build: { context: ../../, dockerfile: infra/docker/Dockerfile.mixnode }
    networks: [zksn-dev]
    ports: ["9001:9001"]
    environment: [ZKSN_TESTNET=1]
    restart: unless-stopped

  mix-node-2:
    build: { context: ../../, dockerfile: infra/docker/Dockerfile.mixnode }
    networks: [zksn-dev]
    ports: ["9002:9001"]
    environment: [ZKSN_TESTNET=1]
    restart: unless-stopped

  mix-node-3:
    build: { context: ../../, dockerfile: infra/docker/Dockerfile.mixnode }
    networks: [zksn-dev]
    ports: ["9003:9001"]
    environment: [ZKSN_TESTNET=1]
    restart: unless-stopped

  yggdrasil-seed:
    image: ghcr.io/yggdrasil-network/yggdrasil-go:latest
    networks: [zksn-dev]
    ports: ["9010:9010"]
    volumes: [./config/yggdrasil-seed.conf:/etc/yggdrasil.conf:ro]
    restart: unless-stopped

  yggdrasil-peer:
    image: ghcr.io/yggdrasil-network/yggdrasil-go:latest
    networks: [zksn-dev]
    volumes: [./config/yggdrasil-peer.conf:/etc/yggdrasil.conf:ro]
    depends_on: [yggdrasil-seed]
    restart: unless-stopped

  i2pd:
    image: purplei2p/i2pd:latest
    networks: [zksn-dev]
    ports: ["4444:4444", "4447:4447"]
    volumes: [./config/i2pd.conf:/home/i2pd/data/i2pd.conf:ro,
              ./config/tunnels.conf:/home/i2pd/data/tunnels.conf:ro]
    restart: unless-stopped

  cashu-mint:
    image: cashubtc/nutshell:latest
    networks: [zksn-dev]
    ports: ["3338:3338"]
    env_file: [./config/cashu.env]
    restart: unless-stopped
