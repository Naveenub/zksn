[profile.default]
src       = "contracts"
out       = "out"
libs      = ["lib"]
test      = "test"
script    = "scripts"
cache_path = "cache"
optimizer = true
optimizer_runs = 200
solc = "0.8.20"

# Run tests with detailed traces by default
verbosity = 2

[profile.ci]
fuzz = { runs = 500 }
verbosity = 1

[fmt]
line_length = 100
tab_width   = 4
bracket_spacing = true
