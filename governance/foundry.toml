[profile.default]
src      = "contracts"
out      = "out"
libs     = ["lib"]
test     = "test"
script   = "scripts"
solc     = "0.8.20"
optimizer        = true
optimizer_runs   = 200
verbosity        = 2

remappings = [
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
mainnet  = "${MAINNET_RPC_URL}"
